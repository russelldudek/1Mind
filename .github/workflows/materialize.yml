name: Materialize candidate campaign
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/materialize.yml'
permissions:
  contents: write
jobs:
  build:
    if: github.event.head_commit.message == 'Materialize candidate campaign source'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Materialize reviewed source
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64, io, tarfile
          parts = sorted(Path('bundle-parts').glob('part-*.txt'))
          if len(parts) != 7:
              raise SystemExit(f'Expected 7 bundle parts, found {len(parts)}')
          data = ''.join(p.read_text().strip() for p in parts)
          with tarfile.open(fileobj=io.BytesIO(base64.b64decode(data)), mode='r:gz') as archive:
              archive.extractall('.')
          print('Materialized reviewed campaign source')
          PY
      - name: Install document dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-inter fonts-lato
          python -m pip install --upgrade pip
          python -m pip install weasyprint pypdf
      - name: Generate printable documents
        run: |
          mkdir -p docs
          weasyprint resume.html docs/Russell-Dudek-1mind-Resume.pdf
          weasyprint cover-letter.html docs/Russell-Dudek-1mind-Cover-Letter.pdf
          weasyprint interview-brief.html docs/Russell-Dudek-1mind-Interview-Thesis-Brief.pdf
          weasyprint 90-day-plan.html docs/Russell-Dudek-1mind-First-90-Days.pdf
          weasyprint operating-memory-review.html docs/Russell-Dudek-1mind-AI-Operating-Memory-Review.pdf
      - name: Verify artifact contract
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          from pypdf import PdfReader
          expected = {
              'Russell-Dudek-1mind-Resume.pdf': 2,
              'Russell-Dudek-1mind-Cover-Letter.pdf': 1,
              'Russell-Dudek-1mind-Interview-Thesis-Brief.pdf': 3,
              'Russell-Dudek-1mind-First-90-Days.pdf': 2,
              'Russell-Dudek-1mind-AI-Operating-Memory-Review.pdf': 1,
          }
          errors = []
          for name, pages in expected.items():
              path = Path('docs') / name
              actual = len(PdfReader(str(path)).pages) if path.exists() else 0
              if actual != pages:
                  errors.append(f'{name}: expected {pages}, found {actual}')
          manifest = json.loads(Path('artifact-manifest.json').read_text())
          for item in manifest['files']:
              if not Path(item).exists():
                  errors.append(f'Missing manifest file: {item}')
          public_text = '\n'.join(
              p.read_text(errors='ignore')
              for p in Path('.').rglob('*')
              if p.is_file() and p.suffix.lower() in {'.html','.css','.js','.md','.txt','.json','.yml'}
              and '.git' not in p.parts and 'bundle-parts' not in p.parts
          ).lower()
          for forbidden in ('roleforge', 'role forge'):
              if forbidden in public_text:
                  errors.append(f'Forbidden candidate-facing term: {forbidden}')
          if errors:
              raise SystemExit('\n'.join(errors))
          print('Artifact contract verified')
          PY
      - name: Publish final source and PDFs
        run: |
          rm -rf bundle-parts
          rm -f .github/workflows/materialize.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Publish complete candidate campaign'
          git push
